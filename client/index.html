    <!-- JSON-LD Structured Data: WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "PNG Gas Tracker India",
      "url": "https://png-gas-tracker-india.manus.space/",

      "applicationCategory": "UtilityApplication",
      "operatingSystem": "Any",
      "browserRequirements": "Requires JavaScript",
      "inLanguage": "en-IN",
      "about": {
        "@type": "Thing",
        "name": "India LNG Supply Monitoring",
        "description": "Tracks LNG imports, terminal reserves at Dahej, Hazira, Kochi, Dabhol, Ennore and Mundra, Henry Hub and JKM spot prices, India gas sector stocks (GAIL, Petronet LNG, Gujarat Gas, MGL, IGL, ATGL), and geopolitical risk from Strait of Hormuz and Red Sea disruptions."
      },
      "featureList": [
        "Real-time LNG import volume tracking",
        "Terminal storage reserve monitoring (6 terminals)",
        "Composite supply disruption risk score",
        "LNG futures and technical indicator analysis",
        "India gas sector stock RSI and MACD signals",
        "Geopolitical alert feed (Middle East, Strait of Hormuz, Red Sea)",
        "Early-warning notifications for supply disruptions",
        "JKM Asia LNG spot price tracking"
      ],
      "creator": {
        "@type": "Organization",
        "name": "PNG Gas Tracker India"
      },
      "dateModified": "2026-03-10",
      "isAccessibleForFree": true,
      "potentialAction": {
        "@type": "ViewAction",
        "target": "https://png-gas-tracker-india.manus.space/"
      }
    }
    </script>

    <!-- JSON-LD Structured Data: Dataset -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Dataset",
      "name": "India LNG Supply & PNG Gas Tracker Data",
      "description": "Real-time and historical data on India's LNG imports, terminal reserves, shipping delays, LNG spot prices (Henry Hub, JKM), India gas sector stock prices, and geopolitical risk indicators.",
      "url": "https://png-gas-tracker-india.manus.space/",
      "keywords": [
        "LNG India", "PNG gas", "natural gas supply India", "Petronet LNG",

      ],
      "creator": {
        "@type": "Organization",
        "name": "PNG Gas Tracker India"
      },
      "temporalCoverage": "2026/..",
      "spatialCoverage": {
        "@type": "Place",
        "name": "India"
      },
      "variableMeasured": [
        "LNG Import Volume (MMTPA)",
        "LNG Spot Price (USD/MMBtu)",
        "Terminal Storage Reserves (MMTPA)",
        "Reserve Days",
        "Shipping Delay (days)",
        "Composite Risk Score (%)",
        "India Gas Sector Stock RSI"
      ]
    }
